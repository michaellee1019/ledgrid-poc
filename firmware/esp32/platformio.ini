[platformio]
; Default to the ESP32-S3 DevKitC-1 board.
default_envs = esp32-s3-devkitc-1
; Allow environment variables to control build flags
extra_configs = 

[env:esp32-s3-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc1-n16r8
framework = arduino
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L

; Build flags - Use UART Serial instead of USB CDC for debugging
; Use DEBUG=1 environment variable to enable verbose logging
; Use RAINBOW=1 to flash LED strip test mode (infinite rainbow, no SPI)
; Example: DEBUG=1 pio run --target upload
; Example: RAINBOW=1 pio run --target upload
build_flags = 
    -O2
    -DARDUINO_USB_CDC_ON_BOOT=0

extra_scripts = pre:extra_script.py

; Upload settings
upload_speed = 460800
monitor_speed = 115200

; Monitor settings
monitor_raw = yes

; Auto-detect port (PlatformIO will find it)
; If detection fails, uncomment and specify manually:
; upload_port = /dev/cu.usbmodem*
; monitor_port = /dev/cu.usbmodem*

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags = -std=gnu++17
build_src_filter =
    +<ws2812_encoder.cpp>
    +<protocol.cpp>
